<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grok Side Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sidepanel-body">
  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Header -->
  <header class="sidepanel-header">
    <div class="sidepanel-header-brand">
      <div class="sidepanel-header-logo">G</div>
      <h1 class="sidepanel-header-title truncate">Grok</h1>
      <div id="conn-dot" class="status-dot inactive" style="width:6px;height:6px;margin-left:4px;" title="Connection status"></div>
    </div>
    <div class="sidepanel-header-actions">
      <button id="history-toggle" class="icon-btn" title="Toggle history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
      </button>
      <button id="reload-frame-btn" class="icon-btn" title="Reload Grok">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 5 15.4a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <button id="context-btn" class="toolbar-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Page Context</span>
    </button>
    <button id="yt-summary-btn" class="toolbar-btn" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      <span>Summarize Video</span>
    </button>
    <button id="extract-article-btn" class="toolbar-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/></svg>
      <span>Read Article</span>
    </button>
    <div class="ml-auto flex items-center gap-2">
      <span id="page-indicator" class="text-xs text-muted truncate" style="max-width:120px;"></span>
    </div>
  </div>

  <!-- Frame Container -->
  <div class="frame-container">
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-overlay-spinner"></div>
      <div class="loading-overlay-text">Loading Grok...</div>
      <div class="text-xs text-muted" style="max-width:200px;text-align:center;">
        If this takes too long, make sure you're logged in at grok.com
      </div>
    </div>
    <iframe id="grok-frame" src="https://grok.com" allow="clipboard-read; clipboard-write"></iframe>
  </div>

  <!-- Connection Status -->
  <div class="conn-status">
    <div id="conn-status-dot" class="status-dot inactive" style="width:6px;height:6px;"></div>
    <span id="conn-status-text" class="font-mono">Not connected</span>
    <span class="ml-auto text-muted" id="conn-page-url"></span>
  </div>

  <!-- History Drawer -->
  <div id="history-drawer" class="history-drawer">
    <div class="history-drawer-header">
      <h2 class="history-drawer-title">History</h2>
      <button id="history-close" class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="history-list" id="history-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>Grok Status</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 300px;
      padding: 16px;
    }
  </style>
</head>

<body class="flex-col gap-4">
  <div class="header flex items-center gap-2">
    <!-- Placeholder for icon -->
    <div style="width: 24px; height: 24px; background: white; border-radius: 4px;"></div>
    <h1 class="text-lg font-bold m-0">Grok Browser Agent</h1>
  </div>

  <div id="status-container" class="p-3 bg-secondary border border-subtle rounded-md">
    <div class="flex items-center gap-2 mb-2">
      <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
      <span id="status-text" class="font-mono text-sm">Checking authentication...</span>
    </div>
    <p class="text-xs text-secondary m-0">
      Please log in to grok.com to enable agent capabilities.
    </p>
  </div>

  <button id="open-panel-btn" class="btn btn-primary w-full">Open Side Panel</button>

  <script src="popup.js"></script>
</body>

</html>
